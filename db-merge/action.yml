name: ghcr-manager db-merge
description: Merge one or more ghcr-manager SQLite databases into a single target database.

branding:
  icon: package
  color: blue

inputs:
  db-path:
    description: Optional local SQLite DB path to write the merged database into
    required: false
    default: ""
  upload-db-artifact:
    description: Whether to upload the merged database as a workflow run artifact
    required: false
    default: "true"
  db-artifact-encryption-passphrase:
    description:
      Optional passphrase used to encrypt uploaded DB artifacts; required for any merged DB with non-public scans
    required: false
    default: ""
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  source-db-paths:
    description: Newline-separated local SQLite DB paths to merge into db-path
    required: true
  log-level:
    description: Log level passed to the shared CLI
    required: false
    default: info

outputs:
  db-path:
    description: Path to the merged SQLite database in the GitHub action runner
    value: ${{ steps.prepare-db.outputs.db_path }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        cache: npm

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        npm ci

    - name: Build ghcr-manager
      shell: bash
      run: |
        set -euo pipefail
        npm run build

    - name: Prepare merge DB path
      id: prepare-db
      shell: bash
      env:
        INPUT_DB_PATH: ${{ inputs.db-path }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        db_file="merged.sqlite"
        if [[ -n "$INPUT_DB_PATH" ]]; then
          db_path="$INPUT_DB_PATH"
          db_dir="$(dirname "$db_path")"
          db_file="$(basename "$db_path")"
        else
          merge_uuid="$(cat /proc/sys/kernel/random/uuid)"
          db_dir="$RUNNER_TEMP/ghcr-manager/$merge_uuid"
          db_path="$db_dir/$db_file"
        fi
        mkdir -p "$db_dir"
        echo "db_file=$db_file" >> "$GITHUB_OUTPUT"
        echo "db_path=$db_path" >> "$GITHUB_OUTPUT"

    - name: Run DB merge
      shell: bash
      env:
        SOURCE_DB_PATHS: ${{ inputs.source-db-paths }}
      run: |
        set -euo pipefail

        merge_args=(
          --db "${{ steps.prepare-db.outputs.db_path }}"
        )

        while IFS= read -r source_db_path; do
          source_db_path="${source_db_path#"${source_db_path%%[![:space:]]*}"}"
          source_db_path="${source_db_path%"${source_db_path##*[![:space:]]}"}"
          if [[ -n "$source_db_path" ]]; then
            merge_args+=(--source-db "$source_db_path")
          fi
        done <<< "$SOURCE_DB_PATHS"

        npm run ghcr-manager:dist -- db-merge "${merge_args[@]}"

    - name: Prepare DB artifact upload
      if: ${{ inputs.upload-db-artifact == 'true' }}
      id: prepare-upload
      shell: bash
      env:
        DB_PATH: ${{ steps.prepare-db.outputs.db_path }}
        DB_ARTIFACT_ENCRYPTION_PASSPHRASE: ${{ inputs.db-artifact-encryption-passphrase }}
      run: |
        set -euo pipefail

        has_non_public_scan="$(node tools/db-has-non-public-scans.mjs "$DB_PATH")"

        artifact_path="${{ steps.prepare-db.outputs.db_path }}"
        artifact_file="${{ steps.prepare-db.outputs.db_file }}"

        if [[ "$has_non_public_scan" == "true" && -z "$DB_ARTIFACT_ENCRYPTION_PASSPHRASE" ]]; then
          echo "Refusing to upload merged DB artifact with non-public scans without encryption." >&2
          echo "Provide db-artifact-encryption-passphrase to encrypt the uploaded artifact." >&2
          exit 1
        fi

        if [[ -n "$DB_ARTIFACT_ENCRYPTION_PASSPHRASE" ]]; then
          if ! command -v openssl >/dev/null 2>&1; then
            echo "openssl is required to encrypt DB artifacts but was not found on PATH." >&2
            exit 1
          fi

          artifact_path="${{ steps.prepare-db.outputs.db_path }}.enc"
          artifact_file="${{ steps.prepare-db.outputs.db_file }}.enc"
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in "${{ steps.prepare-db.outputs.db_path }}" \
            -out "$artifact_path" \
            -pass env:DB_ARTIFACT_ENCRYPTION_PASSPHRASE
        fi

        echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
        echo "artifact_file=$artifact_file" >> "$GITHUB_OUTPUT"

    - name: Upload DB artifact
      if: ${{ inputs.upload-db-artifact == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.prepare-upload.outputs.artifact_file }}
        path: ${{ steps.prepare-upload.outputs.artifact_path }}
        retention-days:
          ${{ inputs.db-artifact-retention-days != '' && inputs.db-artifact-retention-days || github.retention_days }}
