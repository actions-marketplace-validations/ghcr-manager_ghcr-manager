name: GHCR Cleanup Manager
description: >
  GHCR cleanup action for GitHub Container Registry package. Handles multi-arch, provenance attestation, and cosign
  signature.
branding:
  icon: package
  color: blue
inputs:
  command:
    description: Action command to run (`scan` or `cleanup`)
    required: true
  token:
    description: GitHub token used for GitHub/GHCR API calls
    required: true
    default: ${{ github.token }}
  owner:
    description: GitHub owner of the container package (user or org)
    required: true
  package:
    description: Container package name.
    required: true
  db-path:
    description: Optional local SQLite DB path to use instead of creating a fresh runner-temp DB file
    required: false
    default: ""
  upload-artifacts:
    description: Whether to upload action-produced artifacts
    required: false
    default: "false"
  scan-after-cleanup:
    description: Whether live cleanup should run a second full scan so the DB reflects post-mutation state
    required: false
    default: "false"
  db-artifact-retention-days:
    description: Optional retention days override for uploaded database artifacts
    required: false
    default: ""
  delete-tags:
    description: Optional newline-separated tags to delete during cleanup
    required: false
    default: ""
  exclude-tags:
    description: Optional newline-separated tags to exclude from cleanup
    required: false
    default: ""
  keep-n-tagged:
    description: Optional number of tagged roots to keep during cleanup
    required: false
    default: ""
  keep-n-untagged:
    description: Optional number of untagged roots to keep during cleanup
    required: false
    default: ""
  delete-untagged:
    description: Whether cleanup should target untagged roots
    required: false
    default: "false"
  delete-ghost-images:
    description: Whether cleanup should target ghost multi-arch roots
    required: false
    default: "false"
  delete-partial-images:
    description: Whether cleanup should target partial multi-arch roots
    required: false
    default: "false"
  delete-orphaned-images:
    description: Whether cleanup should target orphaned digest-derived tags
    required: false
    default: "false"
  older-than:
    description: Optional age cutoff for cleanup selectors
    required: false
    default: ""
  use-regex:
    description: Whether cleanup tag selectors should be treated as regular expressions
    required: false
    default: "false"
  dry-run:
    description: Whether cleanup should simulate changes without mutating GHCR
    required: false
    default: "false"
  log-level:
    description: Log level passed to the shared CLI
    required: false
    default: info

outputs:
  db-path:
    description: Path to the SQLite database in the GitHub action runner
    value: ${{ steps.ghcr-cleanup-manager.outputs.db-path }}
  summary-json-path:
    description: Path to the command summary JSON file for commands that emit one
    value: ${{ steps.ghcr-cleanup-manager.outputs.summary-json-path }}

runs:
  using: composite
  steps:
    - name: Warn about moved action
      shell: bash
      run: |
        echo "::warning title=Action moved::ghcr-manager/ghcr-manager is now a wrapper."
        echo "::warning title=Action moved::Please migrate to ghcr-manager/ghcr-cleanup-manager."

    - id: ghcr-cleanup-manager
      uses: ghcr-manager/ghcr-cleanup-manager@cf1cb8d94b1e28f8c9777bc37e7132453c7a90ae  # v1.1.2
      with:
        command: ${{ inputs.command }}
        token: ${{ inputs.token }}
        owner: ${{ inputs.owner }}
        package: ${{ inputs.package }}
        db-path: ${{ inputs.db-path }}
        upload-artifacts: ${{ inputs.upload-artifacts }}
        scan-after-cleanup: ${{ inputs.scan-after-cleanup }}
        db-artifact-retention-days: ${{ inputs.db-artifact-retention-days }}
        delete-tags: ${{ inputs.delete-tags }}
        exclude-tags: ${{ inputs.exclude-tags }}
        keep-n-tagged: ${{ inputs.keep-n-tagged }}
        keep-n-untagged: ${{ inputs.keep-n-untagged }}
        delete-untagged: ${{ inputs.delete-untagged }}
        delete-ghost-images: ${{ inputs.delete-ghost-images }}
        delete-partial-images: ${{ inputs.delete-partial-images }}
        delete-orphaned-images: ${{ inputs.delete-orphaned-images }}
        older-than: ${{ inputs.older-than }}
        use-regex: ${{ inputs.use-regex }}
        dry-run: ${{ inputs.dry-run }}
        log-level: ${{ inputs.log-level }}
