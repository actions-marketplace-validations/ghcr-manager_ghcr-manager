name: "CI: lint"

"on":
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  lint:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9467f3db8f5f3c942629468981c4a2a67d0caa64  # v2.6.1
        with:
          include-first-party: "true"
          write-job-summary: "on-failure-only"

      - name: Super-Linter
        uses: ./.github/actions/lint
