name: "CI: lint"

"on":
  workflow_call:
  workflow_dispatch:
    inputs:
      write-job-summary:
        description: "Controls job summary output"
        required: false
        default: "on-failure-only"
        type: choice
        options:
          - "on-failure-only"
          - "true"
  pull_request:
  push:

permissions:
  contents: read

jobs:
  lint:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Ensure workflow actions use immutable refs
        uses: joshjohanning/ensure-immutable-actions@9467f3db8f5f3c942629468981c4a2a67d0caa64  # v2.6.1
        with:
          include-first-party: "true"
          write-job-summary: ${{ inputs.write-job-summary || 'on-failure-only' }}

      - name: Super-Linter
        uses: ./.github/actions/lint
