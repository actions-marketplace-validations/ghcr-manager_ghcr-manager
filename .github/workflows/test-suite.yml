name: Test Suite

"on":
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure workflow actions use immutable refs
        uses: Wuodan/ensure-immutable-actions@ae103574d29215453dd06de89d61422edacf20a5 # v2.5.5-Wuodan.main
        with:
          include-first-party: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Run linters
        run: |
          scripts/lint.sh
