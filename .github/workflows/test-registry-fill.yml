name: "Test Registry: Fill"

"on":
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-test
  LATEST_TAG: latest

jobs:
  build_amd64:
    name: Build image (amd64)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: amd64
          platform: linux/amd64

  build_arm64:
    name: Build image (arm64)
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and test image
        id: build
        uses: ./.github/actions/test-registry-build-image
        with:
          image_ref: ${{ env.IMAGE_REF }}
          arch: arm64
          platform: linux/arm64

  publish:
    name: Publish multi-arch image
    needs:
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish multi-arch image
        uses: gh-workflow/multiarch-image-publish@0.1.11
        with:
          image_ref: ${{ env.IMAGE_REF }}
          # Image tag list:
          # - github.ref_name:
          #   - On workflow_dispatch equals the branch name.
          #   - On a git tag push equals the git-tag
          # - env.LATEST_TAG:
          #   - default=latest
          tags: |
            ${{ github.ref_name }}
            ${{ env.LATEST_TAG }}
          platform_digests: |
            linux/amd64=${{ needs.build_amd64.outputs.digest }}
            linux/arm64=${{ needs.build_arm64.outputs.digest }}
          annotations: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Print result
        run: |
          echo "Published ${{ env.IMAGE_REF }}:${{ github.ref_name }}"
          echo "Published ${{ env.IMAGE_REF }}:${{ env.LATEST_TAG }}"
